<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Community App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <h1>Create an account</h1>
        <p>Join the community and start sharing your story.</p>

        <p id="registerMessage"></p>

        <label for="nameInput">Name</label>
        <input id="nameInput" type="text" placeholder="Your name">

        <label for="usernameInput">Username</label>
        <input id="usernameInput" type="text" placeholder="Choose a username">

        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" placeholder="Create a password">

        <button id="registerButton">Register</button>

        <p>Already have an account? Log in later.</p>
    </main>

    <script src="auth.js"></script>
</body>
</html>
